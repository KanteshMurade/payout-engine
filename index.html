<!DOCTYPE html>
<html>
<head>
<title>Payout</title>
</head>

<body>
<h2>Create Payout</h2>

<input id="merchant" placeholder="Merchant ID"><br><br>
<input id="amount" placeholder="Amount"><br><br>

<button onclick="send()">Send</button>

<p id="result"></p>

<h3>History</h3>
<ul id="history"></ul>

<script>
const BASE = "https://payout-engine.onrender.com";

async function send() {
  let merchant = document.getElementById("merchant").value;
  let amount = document.getElementById("amount").value;

  let res = await fetch(BASE + "/api/v1/payouts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      merchant_id: parseInt(merchant),
      amount_paise: parseInt(amount)
    })
  });

  let data = await res.json();

  document.getElementById("result").innerText =
    "ID: " + data.payout_id + " Status: " + data.status;

  loadHistory(merchant);
}

async function loadHistory(m) {
  let res = await fetch(BASE + "/api/v1/payouts/list/?merchant_id=" + m);
  let data = await res.json();

  let ul = document.getElementById("history");
  ul.innerHTML = "";

  data.forEach(p => {
    let li = document.createElement("li");
    li.innerText = `ID ${p.id} | ${p.amount} | ${p.status}`;
    ul.appendChild(li);
  });
}
</script>

</body>
</html>
