<!DOCTYPE html>
<html>
<head>
  <title>Payout Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .success {
      color: #4ade80;
      margin-top: 10px;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }

    .balance {
      margin-top: 10px;
      color: #facc15;
      font-weight: bold;
    }

    .history {
      margin-top: 15px;
      font-size: 14px;
    }

    ul {
      padding-left: 15px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Create Payout</h2>

  <input id="merchant" placeholder="Merchant ID" />
  <input id="amount" placeholder="Amount (paise)" />

  <button onclick="send()">Send</button>

  <div id="balance" class="balance"></div>
  <div id="result"></div>

  <div class="history">
    <h3>History</h3>
    <ul id="history"></ul>
  </div>
</div>

<script>
const BASE_URL = "https://payout-engine.onrender.com";

async function send() {
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;

  if (!merchant || !amount) {
    showError("Enter all fields");
    return;
  }

  try {
    const res = await fetch(BASE_URL + "/api/v1/payouts/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Idempotency-Key": Date.now()
      },
      body: JSON.stringify({
        merchant_id: parseInt(merchant),
        amount_paise: parseInt(amount)
      })
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error || JSON.stringify(data));
      return;
    }

    showSuccess(`✔ ID: ${data.payout_id} | ${data.status}`);

    loadData(merchant);

  } catch (err) {
    showError("Server not reachable");
  }
}

function showSuccess(msg) {
  document.getElementById("result").innerHTML =
    `<div class="success">${msg}</div>`;
}

function showError(msg) {
  document.getElementById("result").innerHTML =
    `<div class="error">❌ ${msg}</div>`;
}

async function loadData(merchant) {
  try {
    // Balance API
    const balRes = await fetch(BASE_URL + `/api/v1/merchant/${merchant}/`);
    const balData = await balRes.json();

    if (balRes.ok) {
      document.getElementById("balance").innerText =
        `💰 Balance: ${balData.balance}`;
    }

    // History API
    const res = await fetch(BASE_URL + `/api/v1/payouts/list/?merchant_id=${merchant}`);
    const list = await res.json();

    const ul = document.getElementById("history");
    ul.innerHTML = "";

    list.forEach(p => {
      const li = document.createElement("li");
      li.innerText = `ID ${p.id} | ₹${p.amount} | ${p.status}`;
      ul.appendChild(li);
    });

  } catch (e) {
    console.log("Error loading data", e);
  }
}
</script>

</body>
</html>
