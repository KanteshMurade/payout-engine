<!DOCTYPE html>
<html>
<head>
  <title>Payout Dashboard</title>
  <style>
    body {
      background: #0b1a2f;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #1e2a44;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Create Payout</h2>

  <input id="merchant" placeholder="Merchant ID" />
  <input id="amount" placeholder="Amount (paise)" />

  <button onclick="send()">Send</button>

  <div id="result"></div>
</div>

<script>
async function send() {
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "Processing... ⏳";

  try {
    const res = await fetch("https://payout-engine.onrender.com/api/v1/payouts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Idempotency-Key": Date.now().toString()
      },
      body: JSON.stringify({
        merchant_id: merchant,
        amount_paise: amount
      })
    });

    const data = await res.json();

    // 🔴 Handle backend error
    if (data.error) {
      resultDiv.innerHTML = `<span style="color:red">❌ ${data.error}</span>`;
      return;
    }

    // 🟢 Success
    resultDiv.innerHTML = `
      <span style="color:lightgreen">
      ✅ Success <br>
      ID: ${data.payout_id} <br>
      Status: ${data.status}
      </span>
    `;

  } catch (err) {
    resultDiv.innerHTML = `<span style="color:red">⚠️ Network Error</span>`;
  }
}
</script>

</body>
</html>
