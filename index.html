<!DOCTYPE html>
<html>
<head>
    <title>Payout Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Create Payout</h2>

    <input id="merchant" placeholder="Merchant ID">
    <input id="amount" placeholder="Amount">

    <button onclick="createPayout()">Send</button>

    <p id="balance"></p>
    <p id="status"></p>

    <h4>History</h4>
    <ul id="history"></ul>
</div>

<script>
const BASE_URL = "https://payout-engine.onrender.com";  // ✅ FIXED

async function loadBalance() {
    let merchant = document.getElementById("merchant").value;
    if (!merchant) return;

    let res = await fetch(`${BASE_URL}/api/v1/balance/${merchant}`);
    let data = await res.json();

    document.getElementById("balance").innerText =
        "💰 Balance: ₹" + data.balance;
}

async function loadHistory() {
    let res = await fetch(`${BASE_URL}/api/v1/payouts/list/`);
    let data = await res.json();

    let list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(p => {
        let li = document.createElement("li");
        li.innerText = `ID ${p.id} | ₹${p.amount} | ${p.status}`;
        list.appendChild(li);
    });
}

async function createPayout() {
    let merchant = document.getElementById("merchant").value;
    let amount = document.getElementById("amount").value;

    try {
        let res = await fetch(`${BASE_URL}/api/v1/payouts`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Idempotency-Key": Date.now()
            },
            body: JSON.stringify({
                merchant_id: merchant,
                amount_paise: amount
            })
        });

        let data = await res.json();

        if (res.status === 200) {
            document.getElementById("status").innerText =
                "✅ ID: " + data.payout_id + " | " + data.status;
        } else {
            document.getElementById("status").innerText =
                "❌ " + data.error;
        }

        loadBalance();
        loadHistory();

    } catch (e) {
        document.getElementById("status").innerText =
            "❌ Server not reachable";
    }
}

document.getElementById("merchant").addEventListener("input", loadBalance);

loadHistory();
</script>

</body>
</html>
