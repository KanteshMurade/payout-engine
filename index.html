<!DOCTYPE html>
<html>
<head>
    <title>Payout Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover {
            background: #16a34a;
        }
        .error { color: red; }
        .success { color: lightgreen; }
    </style>
</head>
<body>

<div class="card">
    <h2>Payout Dashboard</h2>

    <input id="merchant" placeholder="Merchant ID" value="1">
    <input id="amount" placeholder="Amount (paise)">

    <button onclick="addMoney()">Add ₹100000</button>
    <button onclick="createPayout()">Send Payout</button>

    <p id="balance"></p>
    <p id="status"></p>

    <h3>History</h3>
    <ul id="history"></ul>
</div>

<script>
const BASE_URL = "https://payout-engine.onrender.com"; // ✅ YOUR BACKEND

// Load Balance
async function loadBalance() {
    let merchant = document.getElementById("merchant").value;
    if (!merchant) return;

    let res = await fetch(`${BASE_URL}/api/v1/balance/${merchant}`);
    let data = await res.json();

    document.getElementById("balance").innerText =
        "💰 Balance: ₹" + data.balance;
}

// Load History
async function loadHistory() {
    let res = await fetch(`${BASE_URL}/api/v1/payouts/list/`);
    let data = await res.json();

    let list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(p => {
        let li = document.createElement("li");
        li.innerText = `ID ${p.id} | ₹${p.amount} | ${p.status}`;
        list.appendChild(li);
    });
}

// Add Balance
async function addMoney() {
    let merchant = document.getElementById("merchant").value;

    await fetch(`${BASE_URL}/api/v1/credit`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            merchant_id: merchant,
            amount: 100000
        })
    });

    loadBalance();
}

// Create Payout
async function createPayout() {
    let merchant = document.getElementById("merchant").value;
    let amount = document.getElementById("amount").value;

    try {
        let res = await fetch(`${BASE_URL}/api/v1/payouts`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Idempotency-Key": Date.now()
            },
            body: JSON.stringify({
                merchant_id: merchant,
                amount_paise: amount
            })
        });

        let data = await res.json();

        if (res.ok) {
            document.getElementById("status").innerText =
                "✅ Payout ID: " + data.payout_id;
        } else {
            document.getElementById("status").innerText =
                "❌ " + data.error;
        }

        loadBalance();
        loadHistory();

    } catch (err) {
        document.getElementById("status").innerText =
            "❌ Server not reachable";
    }
}

// Auto load
loadHistory();
loadBalance();
</script>

</body>
</html>
