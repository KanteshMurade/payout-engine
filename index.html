<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payout Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}
button {
    width: 100%;
    padding: 10px;
    background: #22c55e;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #16a34a;
}
.status {
    margin-top: 10px;
}
.success { color: #22c55e; }
.error { color: #ef4444; }
.history {
    text-align: left;
    margin-top: 15px;
}
</style>

</head>
<body>

<div class="card">
    <h2>Create Payout</h2>

    <input type="number" id="merchant" placeholder="Merchant ID" value="1">
    <input type="number" id="amount" placeholder="Amount (paise)">

    <button onclick="createPayout()">Send</button>

    <div id="balance"></div>
    <div id="result" class="status"></div>

    <div class="history">
        <h4>History</h4>
        <ul id="history"></ul>
    </div>
</div>

<script>
const API = "https://payout-engine.onrender.com/api/v1"; // your backend

async function createPayout() {
    const merchant = document.getElementById("merchant").value;
    const amount = document.getElementById("amount").value;

    const resDiv = document.getElementById("result");

    try {
        const res = await fetch(`${API}/payouts`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Idempotency-Key": Math.random().toString()
            },
            body: JSON.stringify({
                merchant_id: merchant,
                amount_paise: amount
            })
        });

        const data = await res.json();

        if (res.ok) {
            resDiv.innerHTML = `✔ ID: ${data.payout_id} | ${data.status}`;
            resDiv.className = "status success";
        } else {
            resDiv.innerHTML = `❌ ${data.error}`;
            resDiv.className = "status error";
        }

        loadHistory();
        loadBalance();

    } catch (e) {
        resDiv.innerHTML = "❌ Server not reachable";
        resDiv.className = "status error";
    }
}

async function loadHistory() {
    const res = await fetch(`${API}/payouts/list/`);
    const data = await res.json();

    const list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(p => {
        const li = document.createElement("li");
        li.innerText = `ID ${p.id} | ₹${p.amount} | ${p.status}`;
        list.appendChild(li);
    });
}

async function loadBalance() {
    const merchant = document.getElementById("merchant").value;

    const res = await fetch(`${API}/balance/${merchant}`);
    const data = await res.json();

    document.getElementById("balance").innerHTML =
        `💰 Balance: ₹${data.balance}`;
}

// auto load
loadHistory();
loadBalance();
</script>

</body>
</html>
