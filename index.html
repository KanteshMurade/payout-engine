<!DOCTYPE html>
<html>
<head>
  <title>Payout Dashboard</title>
</head>
<body>

<h2>Create Payout</h2>

<input id="merchant" placeholder="Merchant ID"><br><br>
<input id="amount" placeholder="Amount"><br><br>

<button onclick="send()">Send</button>

<h3 id="balance"></h3>
<div id="result"></div>

<h3>History</h3>
<ul id="history"></ul>

<script>
async function send() {
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch("https://payout-engine.onrender.com/api/v1/payouts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Idempotency-Key": Date.now().toString()
    },
    body: JSON.stringify({
      merchant_id: merchant,
      amount_paise: amount
    })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("result").innerText = data.error;
    return;
  }

  document.getElementById("result").innerText =
    "ID: " + data.payout_id + " Status: " + data.status;

  loadHistory();
  loadBalance(merchant);
}

async function loadHistory() {
  const res = await fetch("https://payout-engine.onrender.com/api/v1/payouts/list");
  const data = await res.json();

  let html = "";
  data.forEach(p => {
    html += `<li>ID ${p.id} - ${p.amount} - ${p.status}</li>`;
  });

  document.getElementById("history").innerHTML = html;
}

async function loadBalance(id) {
  const res = await fetch(`https://payout-engine.onrender.com/api/v1/balance/${id}`);
  const data = await res.json();

  if (!data.error) {
    document.getElementById("balance").innerText =
      "Balance: " + data.balance;
  }
}

loadHistory();
</script>

</body>
</html>
