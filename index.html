<!DOCTYPE html>
<html>
<head>
  <title>Payout Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Create Payout</h2>

  <input id="merchant" placeholder="Merchant ID" />
  <input id="amount" placeholder="Amount (paise)" />

  <button onclick="send()">Send</button>

  <div class="result" id="result"></div>
</div>

<script>
async function send() {
  const merchant = document.getElementById("merchant").value;
  const amount = document.getElementById("amount").value;

  try {
    const res = await fetch("https://payout-engine.onrender.com/api/v1/payouts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Idempotency-Key": Date.now().toString()
      },
      body: JSON.stringify({
        merchant_id: merchant,
        amount_paise: amount
      })
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
      `<b>Success:</b><br>ID: ${data.payout_id}<br>Status: ${data.status}`;

  } catch (err) {
    document.getElementById("result").innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
